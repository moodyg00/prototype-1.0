services:
  postgres:
    image: postgres:16-alpine
    container_name: prototype-postgres
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: prototype
    volumes:
      - prototype_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d prototype']
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  prototype_pg_data: