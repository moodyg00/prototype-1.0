packages:
  - "apps/*"
  - "packages/*"

# Hostinger runs pnpm 11 via Corepack with CI=true (frozen-lockfile). Opt out of
# the 24h minimumReleaseAge default so lockfile entries install reliably.
minimumReleaseAge: 0

# pnpm 11 blocks lifecycle scripts unless explicitly allowed (strictDepBuilds).
allowBuilds:
  "@prisma/engines": true
  esbuild: true
  prisma: true
  sharp: true
  unrs-resolver: true
