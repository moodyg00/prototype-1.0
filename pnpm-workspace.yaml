packages:
  - "apps/*"
  - "packages/*"

# Hostinger runs pnpm 11 via Corepack with CI=true (frozen-lockfile). Opt out of
# the 24h minimumReleaseAge default so lockfile entries install reliably.
minimumReleaseAge: 0

# pnpm 11 blocks lifecycle scripts unless explicitly allowed (strictDepBuilds).
allowBuilds:
  "@prisma/engines": true
  # ssh2 ships a pure-JS implementation; the optional native cpu-features build
  # is skipped so installs stay portable (Hostinger CI included).
  cpu-features: false
  esbuild: true
  prisma: true
  sharp: true
  ssh2: false
  unrs-resolver: true
